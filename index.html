<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LeverSales - White Label Prototype</title>
    <style>
        /* 1. CRIANDO AS VARIÁVEIS DE CORES */
        /* Cores padrão (Modo Escuro) */
        :root {
            --cor-fundo: #121212;
            --cor-painel: #1e1e1e;
            --cor-lateral: #0a0a0a;
            --cor-texto: #ffffff;
            --cor-texto-suave: #cccccc;
            --cor-borda: #333333;
            --cor-input: #2d2d2d;
            --cor-borda-input: #444444;
            --cor-primaria: #ff6600;
            --cor-primaria-hover: #e65c00;
            --cor-cabecalho-tabela: #2a2a2a;
            --filtro-calendario: invert(1);
        }

        /* Cores quando o Modo Claro estiver ativado */
        .tema-claro {
            --cor-fundo: #f4f7f6;
            --cor-painel: #ffffff;
            --cor-lateral: #ffffff;
            --cor-texto: #333333;
            --cor-texto-suave: #666666;
            --cor-borda: #e0e0e0;
            --cor-input: #ffffff;
            --cor-borda-input: #cccccc;
            --cor-cabecalho-tabela: #f8f9fa;
            --filtro-calendario: invert(0);
        }

        /* 2. APLICANDO AS VARIÁVEIS NO DESIGN */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; transition: background-color 0.3s, color 0.3s; }
        
        body { background-color: var(--cor-fundo); color: var(--cor-texto); overflow-x: hidden; }
        
        #login-screen { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: var(--cor-lateral); display: flex; justify-content: center; align-items: center; z-index: 1000; }
        .login-box { background: var(--cor-painel); padding: 40px; border-radius: 8px; width: 350px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.3); border: 1px solid var(--cor-borda); }
        .login-box h2 { color: var(--cor-primaria); margin-bottom: 20px; } 
        .login-box input { width: 100%; padding: 12px; margin: 10px 0; background: var(--cor-input); border: 1px solid var(--cor-borda-input); border-radius: 4px; color: var(--cor-texto); }
        
        .btn-orange { background: var(--cor-primaria); color: white; padding: 12px; width: 100%; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-orange:hover { background: var(--cor-primaria-hover); }

        #main-system { display: none; display: flex; height: 100vh; }
        
        .sidebar { width: 250px; background: var(--cor-lateral); padding: 20px; display: flex; flex-direction: column; border-right: 1px solid var(--cor-borda); }
        .sidebar h2 { color: var(--cor-primaria); margin-bottom: 30px; text-align: center; font-size: 24px; }
        .menu-item { padding: 15px; margin-bottom: 10px; border-radius: 4px; cursor: pointer; color: var(--cor-texto-suave); font-weight: 500; }
        .menu-item:hover, .menu-item.active { background: var(--cor-painel); color: var(--cor-texto); border-left: 4px solid var(--cor-primaria); }

        .content { flex: 1; padding: 40px; overflow-y: auto; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; border-bottom: 1px solid var(--cor-borda); padding-bottom: 20px; }
        
        .card { background: var(--cor-painel); padding: 25px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 30px; border: 1px solid var(--cor-borda); }
        
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .form-group { display: flex; flex-direction: column; }
        .form-group.full { grid-column: span 2; }
        label { font-weight: 600; margin-bottom: 5px; font-size: 14px; color: var(--cor-texto-suave); }
        
        input { padding: 10px; background: var(--cor-input); border: 1px solid var(--cor-borda-input); border-radius: 4px; color: var(--cor-texto); }
        input[type="datetime-local"]::-webkit-calendar-picker-indicator { filter: var(--filtro-calendario); cursor: pointer; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { text-align: left; padding: 12px; border-bottom: 1px solid var(--cor-borda); }
        th { background-color: var(--cor-cabecalho-tabela); color: var(--cor-primaria); } 
        
        .status-badge { background: var(--cor-primaria); color: white; padding: 5px 10px; border-radius: 20px; font-size: 12px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-box">
            <h2>LeverSales</h2>
            <p style="color: var(--cor-texto-suave); margin-bottom: 20px; font-size: 14px;">Acesse seu painel administrativo</p>
            <input type="text" placeholder="E-mail" value="admin@leversales.com.br">
            <input type="password" placeholder="Senha" value="123456">
            <button class="btn-orange" onclick="entrarNoSistema()">Entrar no Sistema</button>
        </div>
    </div>

    <div id="main-system" style="display: none;">
        
        <div class="sidebar">
            <h2>LeverSales</h2>
            <div class="menu-item active">📅 Agendamentos</div>
            <div class="menu-item">👥 Clientes</div>
            <div class="menu-item">⚙️ Configurações</div>
            
            <div class="menu-item" id="btn-tema" onclick="trocarTema()" style="margin-top: 20px; background: var(--cor-painel);">
                ☀️ Modo Claro
            </div>

            <div style="margin-top: auto;" class="menu-item" onclick="location.reload()">Sair da Conta</div>
        </div>

        <div class="content">
            <div class="header">
                <h1>Painel de Agendamentos</h1>
                <p>Módulo de Integração: <strong style="color: var(--cor-primaria);">Google Calendar Ativo</strong></p>
            </div>

            <div class="card">
                <h3 style="margin-bottom: 20px;">Novo Agendamento</h3>
                <form id="formAgendamento">
                    <div class="form-grid">
                        <div class="form-group full">
                            <label>Título do Agendamento</label>
                            <input type="text" id="titulo" placeholder="Ex: Reunião de Apresentação" required>
                        </div>
                        <div class="form-group full">
                            <label>Nome do Cliente</label>
                            <input type="text" id="nome" placeholder="Ex: Maria Oliveira" required>
                        </div>
                        <div class="form-group">
                            <label>WhatsApp</label>
                            <input type="text" id="telefone" placeholder="(11) 90000-0000" required>
                        </div>
                        <div class="form-group">
                            <label>E-mail</label>
                            <input type="email" id="email" placeholder="maria@email.com" required>
                        </div>
                        <div class="form-group">
                            <label>Data de Início</label>
                            <input type="datetime-local" id="data_inicio" required>
                        </div>
                        <div class="form-group">
                            <label>Data de Fim</label>
                            <input type="datetime-local" id="data_fim" required>
                        </div>
                    </div>
                    <button type="submit" class="btn-orange" style="margin-top: 20px;">Salvar e Enviar para Agenda 🚀</button>
                    <p id="mensagem-status" style="margin-top: 15px; font-weight: bold; text-align: center;"></p>
                </form>
            </div>

            <div class="card">
                <h3 style="margin-bottom: 15px;">Últimos Registros</h3>
                <table>
                    <thead>
                        <tr>
                            <th>Cliente</th>
                            <th>Contato</th>
                            <th>Início</th>
                            <th>Status no Google</th>
                        </tr>
                    </thead>
                    <tbody id="tabela-clientes">
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // Função para trocar o tema (Claro/Escuro)
        function trocarTema() {
            // Liga ou desliga a classe 'tema-claro' no corpo da página
            document.body.classList.toggle('tema-claro');
            
            // Pega o botão para mudarmos o texto dele
            const botaoTema = document.getElementById('btn-tema');
            
            // Verifica se o modo claro está ativo para mudar o texto do botão
            if (document.body.classList.contains('tema-claro')) {
                botaoTema.innerText = '🌙 Modo Escuro';
            } else {
                botaoTema.innerText = '☀️ Modo Claro';
            }
        }


        // FUNÇÃO PARA CARREGAR DADOS DO GOOGLE
async function carregarAgendamentos() {
    const tabela = document.getElementById('tabela-clientes');
    tabela.innerHTML = '<tr><td colspan="4" style="text-align:center; color: var(--cor-primaria);">⚡ Acedendo ao Google Calendar...</td></tr>';

    try {
        // Ajusta a URL para a nova rota de listagem
        const URL_LISTAR = URL_DA_PONTE.replace('/receber-agendamento', '/listar-agendamentos');
        
        const resposta = await fetch(URL_LISTAR);
        const eventos = await resposta.json();

        tabela.innerHTML = ''; // Limpa a mensagem de carregamento

        if (!eventos || eventos.length === 0) {
            tabela.innerHTML = '<tr><td colspan="4" style="text-align:center;">Nenhum agendamento futuro encontrado.</td></tr>';
            return;
        }

        eventos.forEach(evento => {
            const inicio = new Date(evento.start.dateTime || evento.start.date).toLocaleString('pt-BR');
            const titulo = evento.summary || 'Sem título';
            
            // Tenta pegar o telefone que guardámos na descrição
            const telefone = evento.description ? evento.description.split('\n')[0] : 'N/A';

            const linha = `
                <tr>
                    <td><strong>${titulo}</strong></td>
                    <td style="color: var(--cor-texto-suave);">${telefone}</td>
                    <td style="color: var(--cor-texto-suave);">${inicio}</td>
                    <td><span class="status-badge">Sincronizado</span></td>
                </tr>
            `;
            tabela.innerHTML += linha;
        });
    } catch (erro) {
        tabela.innerHTML = '<tr><td colspan="4" style="text-align:center; color: #ff3333;">⚠️ Erro ao sincronizar com o Google.</td></tr>';
    }
}
        // Função de Login
        function entrarNoSistema() {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('main-system').style.display = 'flex';
    carregarAgendamentos(); // Chama a função assim que entra!
}

        // Função do Formulário e Integração
        document.getElementById('formAgendamento').addEventListener('submit', async function(evento) {
            evento.preventDefault(); 
            
            const msgStatus = document.getElementById('mensagem-status');
            const botao = document.querySelector('button[type="submit"]');
            
            botao.innerText = "Processando Integração...";
            botao.style.background = "var(--cor-borda)"; 
            msgStatus.innerText = "";

            const nome = document.getElementById('nome').value;
            const telefone = document.getElementById('telefone').value;
            const email = document.getElementById('email').value;
            const dataInicio = document.getElementById('data_inicio').value;
            const dataFim = document.getElementById('data_fim').value;

            const pacoteDeDados = {
                nome: nome,
                telefone: telefone,
                email: email,
                data_inicio: dataInicio + ':00-03:00', 
                data_fim: dataFim + ':00-03:00'
            };

            try {
                // ATENÇÃO: Lembre-se de trocar localhost pelo link do Ngrok antes da apresentação
                const URL_DA_PONTE = 'https://servidor-prototipo.onrender.com/receber-agendamento';

                const resposta = await fetch(URL_DA_PONTE, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(pacoteDeDados)
                });

                if (resposta.ok) {
                    msgStatus.innerText = "✅ Sucesso! Evento sincronizado com o Google Agendas.";
                    msgStatus.style.color = "var(--cor-primaria)"; 
                    adicionarNaTabela(nome, telefone, dataInicio);
                    document.getElementById('formAgendamento').reset();
                } else {
                    msgStatus.innerText = "❌ Erro ao enviar para a Agenda.";
                    msgStatus.style.color = "#ff3333"; 
                }
            } catch (erro) {
                msgStatus.innerText = "⚠️ Erro de conexão! A Ponte Node.js está ligada no computador?";
                msgStatus.style.color = "#ff3333";
            } finally {
                botao.innerText = "Salvar e Enviar para Agenda 🚀";
                botao.style.background = "var(--cor-primaria)";
            }
        });

        // Função de Atualizar Tabela Visual
        function adicionarNaTabela(nome, telefone, data) {
            const tabela = document.getElementById('tabela-clientes');
            const dataFormatada = new Date(data).toLocaleString('pt-BR'); 

            const novaLinha = `
                <tr>
                    <td><strong>${nome}</strong></td>
                    <td style="color: var(--cor-texto-suave);">${telefone}</td>
                    <td style="color: var(--cor-texto-suave);">${dataFormatada}</td>
                    <td><span class="status-badge">Sincronizado</span></td>
                </tr>
            `;
            tabela.innerHTML = novaLinha + tabela.innerHTML;
        }
    </script>
</body>
</html>
